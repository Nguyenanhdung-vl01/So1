<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🎯 Bài Tập | Physics Lab</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      /* === BAITAP SPECIFIC STYLES === */
      .quiz-header {
        text-align: center;
        margin-bottom: 2rem;
      }
      .topic-grid {
        display: grid;
        gap: 1.2rem;
        margin-top: 1rem;
      }
      .grade-title {
        font-size: 1.4rem;
        margin: 1.8rem 0 0.8rem;
        padding-left: 1rem;
        border-left: 4px solid var(--primary);
      }
      .topic-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 1.2rem;
        cursor: pointer;
        transition: 0.3s;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .topic-card:hover {
        background: var(--surface-hover);
        transform: translateX(6px);
        border-color: var(--primary);
      }
      .topic-info h3 {
        margin-bottom: 0.3rem;
        font-size: 1.05rem;
      }
      .topic-info p {
        color: var(--muted);
        font-size: 0.85rem;
      }
      .badge {
        background: rgba(59, 130, 246, 0.15);
        color: var(--primary);
        padding: 2px 10px;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 600;
      }

      .quiz-box {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 2rem;
        margin-top: 1rem;
      }
      .progress-bar {
        height: 8px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 4px;
        margin-bottom: 1.5rem;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--primary), var(--secondary));
        width: 0%;
        transition: 0.4s;
      }
      .question-text {
        font-size: 1.15rem;
        margin-bottom: 1.5rem;
        line-height: 1.5;
      }

      .options {
        display: grid;
        gap: 0.8rem;
      }
      .opt {
        padding: 1rem;
        border: 1px solid var(--border);
        border-radius: 12px;
        cursor: pointer;
        transition: 0.3s;
        background: var(--surface);
        position: relative;
        overflow: hidden;
      }
      .opt:hover:not(.disabled) {
        background: var(--surface-hover);
        transform: translateX(5px);
      }
      .opt.correct {
        background: rgba(16, 185, 129, 0.2);
        border-color: var(--success);
        color: #fff;
      }
      .opt.wrong {
        background: rgba(239, 68, 68, 0.2);
        border-color: #ef4444;
        color: #fff;
      }
      .opt.disabled {
        pointer-events: none;
        opacity: 0.8;
      }

      .explanation {
        margin-top: 1rem;
        padding: 0.8rem;
        background: rgba(0, 0, 0, 0.2);
        border-radius: 10px;
        font-size: 0.9rem;
        color: var(--muted);
        display: none;
        border-left: 3px solid var(--secondary);
      }
      .explanation.show {
        display: block;
        animation: fadeUp 0.3s ease;
      }

      .nav-btns {
        display: flex;
        gap: 1rem;
        margin-top: 1.5rem;
        justify-content: flex-end;
      }
      .btn-quiz {
        padding: 0.7rem 1.5rem;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text);
        cursor: pointer;
        transition: 0.3s;
        font-weight: 600;
      }
      .btn-quiz:hover:not(:disabled) {
        background: var(--surface-hover);
      }
      .btn-quiz:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .btn-quiz.primary {
        background: var(--primary);
        border-color: transparent;
        color: #fff;
      }
      .btn-quiz.primary:hover:not(:disabled) {
        background: var(--secondary);
      }

      .result-box {
        text-align: center;
        padding: 3rem 2rem;
      }
      .score-circle {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background: var(--surface);
        border: 4px solid var(--primary);
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1.5rem;
        font-size: 2.5rem;
        font-weight: 800;
      }
      .confetti-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 999;
      }

      @media (max-width: 768px) {
        .topic-grid {
          grid-template-columns: 1fr;
        }
        .quiz-box {
          padding: 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="loader"><div class="spinner"></div></div>
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>
    <canvas id="particles"></canvas>

    <nav id="navbar">
      <div class="nav-wrap">
        <a href="index.html" class="logo">⚛️ <span>Physics Lab</span></a>
        <ul class="nav-links">
          <li><a href="index.html">Trang chủ</a></li>
          <li><a href="Kienthuc.html">Kiến thức</a></li>
          <li><a href="Baitap.html" class="active">Bài tập</a></li>
          <li><a href="Mophong.html">Mô phỏng</a></li>
        </ul>
      </div>
    </nav>

    <main class="container" style="padding-top: 8rem">
      <div class="quiz-header reveal">
        <h1>🎯 Luyện Tập Thông Minh</h1>
        <p style="color: var(--muted)">
          Chọn chủ đề phù hợp. Hệ thống sẽ chấm điểm tức thì & giải thích chi
          tiết.
        </p>
      </div>

      <!-- TOPIC SELECTION -->
      <section id="topic-screen" class="reveal">
        <div class="grade-title">📘 Lớp 10</div>
        <div class="topic-grid" id="grid-10"></div>
        <div class="grade-title" style="border-left-color: var(--secondary)">
          📕 Lớp 11
        </div>
        <div class="topic-grid" id="grid-11"></div>
        <div class="grade-title" style="border-left-color: var(--success)">
          📗 Lớp 12
        </div>
        <div class="topic-grid" id="grid-12"></div>
      </section>

      <!-- QUIZ AREA -->
      <section id="quiz-screen" style="display: none">
        <div class="progress-bar">
          <div class="progress-fill" id="prog"></div>
        </div>
        <div class="quiz-box">
          <div
            style="
              display: flex;
              justify-content: space-between;
              margin-bottom: 1rem;
              color: var(--muted);
              font-size: 0.9rem;
            "
          >
            <span id="topic-badge"></span>
            <span id="q-counter">Câu 1/5</span>
          </div>
          <div class="question-text" id="q-text"></div>
          <div class="options" id="opts"></div>
          <div class="explanation" id="explain"></div>
          <div class="nav-btns">
            <button class="btn-quiz" onclick="backToTopics()">
              ↺ Đổi chủ đề
            </button>
            <button
              class="btn-quiz primary"
              id="next-btn"
              onclick="nextQuestion()"
              disabled
            >
              Câu tiếp ➡️
            </button>
          </div>
        </div>
      </section>

      <!-- RESULTS -->
      <section id="result-screen" style="display: none">
        <div class="quiz-box result-box">
          <div class="score-circle" id="final-score">0/5</div>
          <h2 id="result-title">🎉 Xuất sắc!</h2>
          <p
            id="result-msg"
            style="
              color: var(--muted);
              margin: 0.5rem auto 1.5rem;
              max-width: 500px;
            "
          ></p>
          <div
            style="
              display: flex;
              gap: 1rem;
              justify-content: center;
              flex-wrap: wrap;
            "
          >
            <button class="btn-quiz primary" onclick="restartQuiz()">
              🔄 Làm lại
            </button>
            <button class="btn-quiz" onclick="backToTopics()">
              📚 Chọn chủ đề khác
            </button>
          </div>
        </div>
      </section>
    </main>

    <footer>© 2026 Physics Lab | Luyện tập tạo nên sự hoàn hảo 💪</footer>
    <canvas class="confetti-canvas" id="confetti-canvas"></canvas>

    <script>
      // 🔗 CORE UI (Loader, Cursor, Particles, Nav, Scroll Reveal)
      window.addEventListener("load", () =>
        document.getElementById("loader").classList.add("hidden"),
      );
      const dot = document.querySelector(".cursor-dot"),
        outline = document.querySelector(".cursor-outline");
      window.addEventListener("mousemove", (e) => {
        dot.style.left = e.clientX + "px";
        dot.style.top = e.clientY + "px";
        outline.style.left = e.clientX + "px";
        outline.style.top = e.clientY + "px";
      });
      document
        .querySelectorAll("a, button, .topic-card, .opt")
        .forEach((el) => {
          el.addEventListener("mouseenter", () =>
            outline.classList.add("cursor-hover"),
          );
          el.addEventListener("mouseleave", () =>
            outline.classList.remove("cursor-hover"),
          );
        });
      const cvs = document.getElementById("particles"),
        ctx = cvs.getContext("2d"),
        particles = [];
      function resize() {
        cvs.width = window.innerWidth;
        cvs.height = window.innerHeight;
      }
      window.addEventListener("resize", resize);
      resize();
      for (let i = 0; i < 40; i++)
        particles.push({
          x: Math.random() * cvs.width,
          y: Math.random() * cvs.height,
          r: Math.random() * 2 + 1,
          dx: (Math.random() - 0.5) * 0.4,
          dy: (Math.random() - 0.5) * 0.4,
        });
      function drawBg() {
        ctx.clearRect(0, 0, cvs.width, cvs.height);
        particles.forEach((p) => {
          p.x += p.dx;
          p.y += p.dy;
          if (p.x < 0 || p.x > cvs.width) p.dx *= -1;
          if (p.y < 0 || p.y > cvs.height) p.dy *= -1;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = "rgba(255,255,255,0.12)";
          ctx.fill();
        });
        requestAnimationFrame(drawBg);
      }
      drawBg();
      const obs = new IntersectionObserver(
        (e) =>
          e.forEach(
            (t) => t.isIntersecting && t.target.classList.add("visible"),
          ),
        { threshold: 0.1 },
      );
      document.querySelectorAll(".reveal").forEach((el) => obs.observe(el));
      let lastScroll = 0;
      window.addEventListener("scroll", () => {
        document
          .getElementById("navbar")
          .classList.toggle(
            "hide",
            window.scrollY > lastScroll && window.scrollY > 100,
          );
        lastScroll = window.scrollY;
      });

      // 🧠 QUIZ LOGIC
      let currentTopic = null,
        currentQs = [],
        qIdx = 0,
        score = 0,
        answered = false;

      function renderTopics() {
        ["10", "11", "12"].forEach((g) => {
          const grid = document.getElementById(`grid-${g}`);
          grid.innerHTML = "";
          Object.entries(bank).forEach(([key, data]) => {
            if (data.grade === `Lớp ${g}`) {
              const card = document.createElement("div");
              card.className = "topic-card";
              card.innerHTML = `
              <div class="topic-info"><h3>${data.name}</h3><p>${data.qs.length} câu hỏi • Trắc nghiệm nhanh</p></div>
              <span class="badge">Làm ngay →</span>
            `;
              card.onclick = () => startQuiz(key);
              grid.appendChild(card);
            }
          });
        });
      }

      function startQuiz(key) {
        currentTopic = key;
        currentQs = [...bank[key].qs]
          .sort(() => Math.random() - 0.5)
          .slice(0, 5);
        qIdx = 0;
        score = 0;
        document.getElementById("topic-screen").style.display = "none";
        document.getElementById("result-screen").style.display = "none";
        document.getElementById("quiz-screen").style.display = "block";
        document.getElementById("topic-badge").textContent =
          bank[key].grade + " - " + bank[key].name;
        loadQuestion();
      }

      function loadQuestion() {
        answered = false;
        document.getElementById("next-btn").disabled = true;
        document.getElementById("q-counter").textContent =
          `Câu ${qIdx + 1}/${currentQs.length}`;
        document.getElementById("prog").style.width =
          `${(qIdx / currentQs.length) * 100}%`;
        document.getElementById("explain").classList.remove("show");

        const q = currentQs[qIdx];
        document.getElementById("q-text").textContent = q.q;
        const optsDiv = document.getElementById("opts");
        optsDiv.innerHTML = "";
        q.opts.forEach((opt, i) => {
          const d = document.createElement("div");
          d.className = "opt";
          d.textContent = opt;
          d.onclick = () => checkAns(i, d, q);
          optsDiv.appendChild(d);
        });
      }

      function checkAns(selected, el, q) {
        if (answered) return;
        answered = true;
        document.querySelectorAll(".opt").forEach((o, i) => {
          o.classList.add("disabled");
          if (i === q.ans) o.classList.add("correct");
          else if (i === selected) o.classList.add("wrong");
        });
        if (selected === q.ans) score++;
        document.getElementById("explain").textContent = "💡 " + q.ex;
        document.getElementById("explain").classList.add("show");
        document.getElementById("next-btn").disabled = false;
      }

      function nextQuestion() {
        qIdx++;
        if (qIdx >= currentQs.length) showResults();
        else loadQuestion();
      }

      function showResults() {
        document.getElementById("quiz-screen").style.display = "none";
        document.getElementById("result-screen").style.display = "block";
        document.getElementById("final-score").textContent =
          `${score}/${currentQs.length}`;
        const pct = score / currentQs.length;
        let title = "",
          msg = "";
        if (pct === 1) {
          title = "🏆 Xuất sắc!";
          msg = "Bạn đã nắm vững chủ đề này. Hãy thử thách chủ đề khác!";
          launchConfetti();
        } else if (pct >= 0.6) {
          title = "👍 Khá tốt!";
          msg = "Kiến thức khá vững, ôn lại 1-2 điểm yếu là hoàn hảo.";
        } else {
          title = "📚 Cần cố gắng!";
          msg = "Đừng nản! Hãy xem lại lý thuyết và làm lại để nhớ sâu hơn.";
        }
        document.getElementById("result-title").textContent = title;
        document.getElementById("result-msg").textContent = msg;
      }

      function restartQuiz() {
        startQuiz(currentTopic);
      }
      function backToTopics() {
        document.getElementById("quiz-screen").style.display = "none";
        document.getElementById("result-screen").style.display = "none";
        document.getElementById("topic-screen").style.display = "block";
      }

      // 🎉 CONFETTI (Lightweight)
      function launchConfetti() {
        const c = document.getElementById("confetti-canvas");
        const cx = c.getContext("2d");
        c.width = window.innerWidth;
        c.height = window.innerHeight;
        const pieces = [];
        for (let i = 0; i < 80; i++)
          pieces.push({
            x: Math.random() * c.width,
            y: -20,
            w: Math.random() * 8 + 4,
            h: Math.random() * 8 + 4,
            c: ["#3b82f6", "#8b5cf6", "#ec4899", "#10b981", "#fbbf24"][
              Math.floor(Math.random() * 5)
            ],
            v: Math.random() * 4 + 2,
            r: Math.random() * 360,
            vr: Math.random() * 10 - 5,
          });
        let f = 0;
        function draw() {
          cx.clearRect(0, 0, c.width, c.height);
          pieces.forEach((p) => {
            p.y += p.v;
            p.r += p.vr;
            cx.save();
            cx.translate(p.x, p.y);
            cx.rotate((p.r * Math.PI) / 180);
            cx.fillStyle = p.c;
            cx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
            cx.restore();
          });
          f++;
          if (f < 150) requestAnimationFrame(draw);
          else cx.clearRect(0, 0, c.width, c.height);
        }
        draw();
      }

      renderTopics();
    </script>
